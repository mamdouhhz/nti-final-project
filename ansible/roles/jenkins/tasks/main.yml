- name: Update all packages
  yum:
    name: "*"
    state: latest

- name: Install Java 21 (required by modern Jenkins)
  yum:
    name: java-21-amazon-corretto
    state: present

- name: Add Jenkins repo
  get_url:
    url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
    dest: /etc/yum.repos.d/jenkins.repo

- name: Import Jenkins GPG key
  rpm_key:
    state: present
    key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key

- name: Install Jenkins
  yum:
    name: jenkins
    state: present
  notify: restart jenkins

- name: Ensure Jenkins is started and enabled
  systemd:
    name: jenkins
    state: started
    enabled: true

- name: Wait for Jenkins to be reachable on port 8080
  wait_for:
    port: 8080
    delay: 10
    timeout: 120

- name: Read initial admin password
  command: cat /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_initial_password
  changed_when: false
  failed_when: false

- name: Show initial admin password
  debug:
    msg: "Jenkins initial admin password: {{ jenkins_initial_password.stdout }}"
  when: jenkins_initial_password.rc == 0

- name: Install Jenkins plugins
  jenkins_plugin:
    name: "{{ item }}"
    url_username: admin
    url_password: "{{ jenkins_initial_password.stdout }}"
    url: http://localhost:8080
  loop: "{{ jenkins_plugins }}"
  notify: restart jenkins
  when: jenkins_initial_password.rc == 0

- name: Install Docker
  yum:
    name: docker
    state: present

- name: Ensure Docker is started and enabled
  systemd:
    name: docker
    state: started
    enabled: true

- name: Add jenkins user to docker group (so Jenkins can run docker commands)
  user:
    name: jenkins
    groups: docker
    append: true
  notify: restart jenkins

- name: Add ec2-user to docker group (for manual testing/debugging)
  user:
    name: ec2-user
    groups: docker
    append: true

- name: Download Trivy install script
  get_url:
    url: https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
    dest: /tmp/install-trivy.sh
    mode: '0755'

- name: Install Trivy
  shell: /tmp/install-trivy.sh -b /usr/local/bin
  args:
    creates: /usr/local/bin/trivy

- name: Download Helm install script
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm-3.sh
    mode: '0755'

- name: Install Helm
  shell: /tmp/get-helm-3.sh
  args:
    creates: /usr/local/bin/helm

