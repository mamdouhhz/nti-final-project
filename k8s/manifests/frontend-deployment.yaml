apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nti-final-project
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 463470958932.dkr.ecr.us-east-2.amazonaws.com/nti-final-ecr/nti-final-project-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"